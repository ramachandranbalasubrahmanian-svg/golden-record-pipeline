version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: golden_record_db
    environment:
      POSTGRES_DB: golden_record
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "golden_record"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
    name: golden_record_pgdata
